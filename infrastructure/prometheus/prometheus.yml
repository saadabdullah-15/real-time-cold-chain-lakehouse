global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: flink-jobmanager
    static_configs:
      - targets: ["jobmanager:9249"]
  - job_name: flink-taskmanager
    static_configs:
      - targets: ["taskmanager:9249"]
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
