name: coldchain-lakehouse

x-flink-environment: &flink-environment
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SCHEMA_REGISTRY_URL: http://schema-registry:8081
  POLARIS_CATALOG_URI: http://polaris:8181/api/catalog
  POLARIS_CATALOG: ${POLARIS_CATALOG}
  POLARIS_CLIENT_ID: ${POLARIS_CLIENT_ID}
  POLARIS_CLIENT_SECRET: ${POLARIS_CLIENT_SECRET}
  POLARIS_REALM: ${POLARIS_REALM}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  MINIO_REGION: ${MINIO_REGION}
  PIPELINE_SCHEMA_VERSION: ${PIPELINE_SCHEMA_VERSION:-1}
  FLINK_RESTORE_PATH: ${FLINK_RESTORE_PATH:-}
  FLINK_PIPELINE_PARALLELISM: "2"
  ENABLE_BUILT_IN_PLUGINS: flink-s3-fs-hadoop-${FLINK_VERSION}.jar
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  AWS_REGION: ${MINIO_REGION}
  FLINK_PROPERTIES: |
    jobmanager.rpc.address: jobmanager
    taskmanager.numberOfTaskSlots: 2
    parallelism.default: 2
    jobmanager.memory.process.size: 1024m
    taskmanager.memory.process.size: 2048m
    state.backend.type: rocksdb
    execution.checkpointing.storage: filesystem
    execution.checkpointing.dir: s3://${MINIO_CHECKPOINT_BUCKET}/checkpoints
    execution.checkpointing.savepoint-dir: s3://${MINIO_CHECKPOINT_BUCKET}/savepoints
    execution.checkpointing.incremental: true
    execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
    execution.checkpointing.max-concurrent-checkpoints: 1
    execution.checkpointing.timeout: 2 min
    restart-strategy.type: fixed-delay
    restart-strategy.fixed-delay.attempts: 3
    restart-strategy.fixed-delay.delay: 10 s
    metrics.reporters: prom
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: 9249
    s3.endpoint: http://minio:9000
    s3.path.style.access: true
    s3.access-key: ${MINIO_ROOT_USER}
    s3.secret-key: ${MINIO_ROOT_PASSWORD}
    s3.region: ${MINIO_REGION}

services:
  kafka:
    image: apache/kafka:${KAFKA_VERSION}
    hostname: kafka
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_MAX_TIMEOUT_MS: 3600000
      # Accelerated profiles compress up to a simulated day into minutes, so
      # their event-time Kafka timestamps can legitimately be ahead of wall time.
      KAFKA_LOG_MESSAGE_TIMESTAMP_AFTER_MAX_MS: 172800000
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:${SCHEMA_REGISTRY_VERSION}
    hostname: schema-registry
    ports:
      - "127.0.0.1:8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  minio:
    build:
      context: .
      dockerfile: infrastructure/minio/Dockerfile
      args:
        MINIO_TAG: RELEASE.2025-10-15T17-29-55Z
    hostname: minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_VERSION}
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  polaris-bootstrap-db:
    image: apache/polaris-admin-tool:${POLARIS_VERSION}
    environment:
      polaris.persistence.type: relational-jdbc
      quarkus.datasource.username: ${POSTGRES_USER}
      quarkus.datasource.password: ${POSTGRES_PASSWORD}
      quarkus.datasource.jdbc.url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POLARIS_BOOTSTRAP_REALM: ${POLARIS_REALM}
      POLARIS_BOOTSTRAP_CLIENT_ID: ${POLARIS_CLIENT_ID}
      POLARIS_BOOTSTRAP_CLIENT_SECRET: ${POLARIS_CLIENT_SECRET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set +e
        bootstrap_output=$$(/opt/jboss/container/java/run/run-java.sh bootstrap \
          -r "$$POLARIS_BOOTSTRAP_REALM" \
          -c "$$POLARIS_BOOTSTRAP_REALM,$$POLARIS_BOOTSTRAP_CLIENT_ID,$$POLARIS_BOOTSTRAP_CLIENT_SECRET" 2>&1)
        bootstrap_status=$$?
        set -e
        printf '%s\n' "$$bootstrap_output"
        if [ "$$bootstrap_status" -eq 0 ]; then
          exit 0
        fi
        if printf '%s' "$$bootstrap_output" | grep -q "already been bootstrapped"; then
          echo "Polaris metastore is already initialized; continuing."
          exit 0
        fi
        exit "$$bootstrap_status"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  polaris:
    image: apache/polaris:${POLARIS_VERSION}
    hostname: polaris
    ports:
      - "127.0.0.1:8181:8181"
      - "127.0.0.1:8182:8182"
    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POLARIS_REALM_CONTEXT_TYPE: default
      POLARIS_REALM_CONTEXT_REALMS: ${POLARIS_REALM}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${MINIO_REGION}
    depends_on:
      polaris-bootstrap-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8182/q/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  bootstrap:
    build:
      context: .
      dockerfile: infrastructure/tools/Dockerfile
    command: ["-m", "tools.bootstrap"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      POLARIS_URL: http://polaris:8181
      POLARIS_REALM: ${POLARIS_REALM}
      POLARIS_CLIENT_ID: ${POLARIS_CLIENT_ID}
      POLARIS_CLIENT_SECRET: ${POLARIS_CLIENT_SECRET}
      POLARIS_CATALOG: ${POLARIS_CATALOG}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_EXTERNAL_ENDPOINT: http://127.0.0.1:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_WAREHOUSE_BUCKET: ${MINIO_WAREHOUSE_BUCKET}
      MINIO_CHECKPOINT_BUCKET: ${MINIO_CHECKPOINT_BUCKET}
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      minio:
        condition: service_healthy
      polaris:
        condition: service_healthy
    restart: "no"

  jobmanager:
    build:
      context: .
      dockerfile: infrastructure/flink/Dockerfile
      args:
        FLINK_VERSION: ${FLINK_VERSION}
    hostname: jobmanager
    command: ["standalone-job", "--job-classname", "com.portfolio.coldchain.ColdChainPipeline"]
    ports:
      - "127.0.0.1:8081:8081"
    environment: *flink-environment
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/overview >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  taskmanager:
    build:
      context: .
      dockerfile: infrastructure/flink/Dockerfile
      args:
        FLINK_VERSION: ${FLINK_VERSION}
    hostname: taskmanager
    command: ["taskmanager"]
    environment: *flink-environment
    depends_on:
      jobmanager:
        condition: service_healthy
    restart: unless-stopped

  trino:
    build:
      context: .
      dockerfile: infrastructure/trino/Dockerfile
      args:
        TRINO_VERSION: ${TRINO_VERSION}
    hostname: trino
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      POLARIS_CATALOG: ${POLARIS_CATALOG}
      POLARIS_CLIENT_ID: ${POLARIS_CLIENT_ID}
      POLARIS_CLIENT_SECRET: ${POLARIS_CLIENT_SECRET}
      POLARIS_REALM: ${POLARIS_REALM}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./infrastructure/trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./infrastructure/trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./infrastructure/trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./infrastructure/trino/etc/log.properties:/etc/trino/log.properties:ro
      - trino-data:/data/trino
      - ./sql:/sql:ro
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    command: ["--kafka.server=kafka:29092", "--group.filter=coldchain.*"]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - jobmanager
      - taskmanager
      - kafka-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: infrastructure/tools/Dockerfile
    profiles: ["tools"]
    entrypoint: ["python", "-m", "simulator"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    volumes:
      - ./data:/app/data
    depends_on:
      bootstrap:
        condition: service_completed_successfully

volumes:
  kafka-data:
  minio-data:
  postgres-data:
  trino-data:
  prometheus-data:
  grafana-data:
